version: '3.8'

services:
  avatar-sea-shop:
    build: .
    container_name: avatar-sea-shop
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./server/.env:/app/.env:ro
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
